# VictoriaMetrics 内置 scrape 配置（Phase 0 仅 scrape 自身与 OTel Collector）
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: victoria-metrics
    static_configs:
      - targets: ["localhost:8428"]

  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
